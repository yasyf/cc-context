# golangci-lint v2 config. CI and the prek commit hook run this — never run it
# by hand (the go capt-hook pack blocks manual invocation). `golangci-lint fmt`
# applies the formatters; `golangci-lint run` applies the linters.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - contextcheck
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - prealloc
    - revive
    - staticcheck
    - unused
  exclusions:
    rules:
      # G304 (file inclusion via variable) targets production code handling
      # untrusted input, not test helpers reading fixtures from testdata/.
      - path: _test\.go
        text: G304
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
