# goreleaser v2 — the canonical base config (pure Go, CGO_ENABLED=0). Layer
# recipes on top (zig CGO, build tags, universal binaries, embed-prebuild) per
# reference/go-ci-and-release.md. Validate locally: goreleaser release --snapshot --clean
version: 2

project_name: ccx

before:
  hooks:
    - go mod tidy

builds:
  - id: ccx
    main: ./cmd/ccx
    binary: ccx
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/yasyf/cc-context/internal/version.Version={{ .Tag }}
      - -X github.com/yasyf/cc-context/internal/version.Commit={{ .Commit }}
      - -X github.com/yasyf/cc-context/internal/version.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# The tar.gz assets feed the Homebrew formula; the bare binaries feed the
# plugin's install-binary.sh. Both share checksums.txt.
archives:
  - id: archive
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: binary
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

# Sign + notarize the darwin binaries with our Apple Developer ID — but only when the
# MACOS_* secrets are set, so repos without Apple creds still release (unsigned) unchanged.
# goreleaser's built-in quill signer is pure Go and runs on the linux runner (no macOS runner).
# REQUIRES a full-chain p12 (leaf + Developer ID intermediate + Apple Root CA): without the
# root, quill emits an unsatisfiable `certificate root[…6.2.6…]` designated requirement that
# macOS SIGKILLs at exec. Bare-binary only (no .app bundle). See reference/go-ci-and-release.md.
notarize:
  macos:
    - enabled: '{{ if envOrDefault "MACOS_SIGN_P12" "" }}true{{ else }}false{{ end }}'
      ids:
        - ccx
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
        # wazero's compiler engine mmaps RWX pages for the format-core WASM module
        # (plain mmap, not MAP_JIT). Hardened-runtime exec of those pages SIGKILLs
        # without allow-unsigned-executable-memory — `ccx format` dies at engine init.
        entitlements: .github/macos/entitlements.plist
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
  # Lets the shared workflow's goreleaser retry re-upload after a mid-publish failure.
  replace_existing_artifacts: true

changelog:
  use: github
