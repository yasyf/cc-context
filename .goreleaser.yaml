# goreleaser v2 — the canonical base config (pure Go, CGO_ENABLED=0). Layer
# recipes on top (zig CGO, build tags, universal binaries, embed-prebuild) per
# reference/go-ci-and-release.md. Validate locally: goreleaser release --snapshot --clean
version: 2

project_name: ccx

before:
  hooks:
    - go mod tidy

builds:
  - id: ccx
    main: ./cmd/ccx
    binary: ccx
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/yasyf/cc-context/internal/version.Version={{ .Tag }}
      - -X github.com/yasyf/cc-context/internal/version.Commit={{ .Commit }}
      - -X github.com/yasyf/cc-context/internal/version.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# The tar.gz assets feed the Homebrew formula; the bare binaries feed the
# plugin's install-binary.sh. Both share checksums.txt.
archives:
  - id: archive
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: binary
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
  # Lets the shared workflow's goreleaser retry re-upload after a mid-publish failure.
  replace_existing_artifacts: true

changelog:
  use: github
