version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  LDFLAGS: >-
    -s -w
    -X github.com/yasyf/cc-context/internal/version.Version={{.VERSION}}
    -X github.com/yasyf/cc-context/internal/version.Commit={{.COMMIT}}

tasks:
  wasm:
    desc: Build the format-core and tree-sitter grammar WASM modules for go:embed
    cmds:
      - bash scripts/build-wasm.sh
      - bash scripts/build-chunk-grammars.sh

  wasm-embed:
    desc: Build the embed-core WASM engine and embed it into internal/semsearch/embed
    cmds:
      - bash scripts/build-embed-wasm.sh

  build:
    desc: Build the binary into ./bin
    deps: [wasm, wasm-embed]
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o bin/ccx ./cmd/ccx
      - ln -sf ../../bin/ccx plugin/bin/ccx

  test:
    desc: Run the test suite with the race detector
    deps: [wasm, wasm-embed]
    cmds:
      - go test -race -count=1 ./...

  vet:
    desc: Vet the module
    deps: [wasm, wasm-embed]
    cmds:
      - go vet ./...

  lint:
    desc: Lint with golangci-lint
    deps: [wasm, wasm-embed]
    cmds:
      - golangci-lint run

  fmt:
    desc: Format with gofumpt + goimports (via golangci-lint)
    cmds:
      - golangci-lint fmt

  ci:
    desc: Everything CI runs
    cmds:
      - task: vet
      - task: lint
      - task: test
      - task: build
