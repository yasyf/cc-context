# cc-context benchmark configuration.
#
# Measures whether ccx reduces the token context an agent processes at equal-or-better
# accuracy. Headline metrics: peak context and total tokens processed. Cost is not a
# metric; the safety ceiling below only stops runaway spend.

[run]
# Models to benchmark, as `claude --model` aliases or full IDs.
models = ["sonnet", "opus"]
# Repeats per (task, arm, model). Agents are stochastic; R>=3 gives a paired delta + stdev.
repeats = 3
# Max agent turns per run; caps runaway trajectories.
max_turns = 60
# Runaway protection only: the runner aborts before measured spend would exceed it. Never reported.
safety_ceiling_usd = 500.0
# Headless autonomy. Identical for both arms. capt-hook guard hooks still fire under bypass
# (they are a hook decision, not a permission); the pilot integrity check proves it.
permission_mode = "bypassPermissions"
timeout_s = 900
# Applied identically to all arms so the only tool-surface difference is ccx itself.
strip_mcp = true
disallowed_tools = ["WebSearch", "WebFetch", "Task"]

[corpus]
# Size floor: Σ bytes of a headline task's gold.traversal_files must exceed this, so ccx's
# fixed overhead stays a small fraction of the naive context a baseline must traverse.
min_traversal_bytes = 100000

[paths]
# All paths are resolved relative to the bench/ directory.
ccx_bin = "/opt/homebrew/bin/ccx"  # the released brew binary (campaign ran v0.11.0); the facade MCP (`ccx mcp`) and the Bash `ccx`
plugin_hooks = "../plugin/hooks"  # the canonical ccx guard pack (single source of truth)
work_root = ".work"               # ephemeral per-run checkouts (git-ignored)
fixtures_root = ".fixtures"       # generated fixture + cloned OSS repos (git-ignored)
results_dir = "results"           # JSONL run records + RESULTS.md

# Real OSS repos, pinned at a tag, for complex large-context tasks. Cloned by build-corpus.
[[repos]]
name = "gorilla-mux"
url = "https://github.com/gorilla/mux"
ref = "v1.8.1"
kind = "go"

[[repos]]
name = "click"
url = "https://github.com/pallets/click"
ref = "8.1.7"
kind = "python"

[[repos]]
name = "tornado"
url = "https://github.com/tornadoweb/tornado"
ref = "v6.4.1"
kind = "python"
