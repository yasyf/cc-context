# cc-context benchmark configuration.
#
# Cache-aware cost-per-correct-answer harness. The metric is the real API bill
# (cache_create + cache_read + input + output) per correct answer, with accuracy
# reported alongside. See README.md for the rtk gate this satisfies.

[run]
# Models to benchmark, as `claude --model` aliases or full IDs.
# Pilot defaults to haiku (cheap); the real run that docs may cite is ["opus", "sonnet"].
models = ["haiku"]
# Repeats per (task, arm, model). Agents are stochastic; R>=3 gives a paired delta + stdev.
repeats = 3
# Hard ceiling on total measured spend. The runner aborts before a run would exceed it.
budget_usd = 15.0
# Headless autonomy. Identical for both arms. capt-hook guard hooks still fire under bypass
# (they are a hook decision, not a permission); the pilot integrity check proves it.
permission_mode = "bypassPermissions"
timeout_s = 900
# Applied identically to BOTH arms so the only tool-surface difference is ccx itself.
strip_mcp = true
disallowed_tools = ["WebSearch", "WebFetch", "Task"]
# Cross-check tolerance: |cost_of(usage) - total_cost_usd| / total_cost_usd must stay under this.
cost_tolerance = 0.02

[paths]
# All paths are resolved relative to the bench/ directory.
ccx_bin = "../bin/ccx"            # local HEAD build: the facade MCP (`ccx mcp`) and the Bash `ccx`
plugin_hooks = "../plugin/hooks"  # the canonical ccx guard pack (single source of truth)
work_root = ".work"               # ephemeral per-run checkouts (git-ignored)
fixtures_root = ".fixtures"       # generated fixture + cloned OSS repos (git-ignored)
results_dir = "results"           # JSONL run records + RESULTS.md

# Real OSS repos, pinned at a tag, for complex large-context tasks. Cloned by build-corpus.
[[repos]]
name = "gorilla-mux"
url = "https://github.com/gorilla/mux"
ref = "v1.8.1"
kind = "go"

[[repos]]
name = "click"
url = "https://github.com/pallets/click"
ref = "8.1.7"
kind = "python"

# Cost is cross-checked against cc-transcript's cost_of (cc_transcript.cost), whose default
# PRICING table (opus 5/25, sonnet 3/15, haiku 1/5, fable 10/50, with cache multipliers
# 5m=1.25 / 1h=2.0 / read=0.1) is the single source of truth — no local price table.
