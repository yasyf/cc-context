name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Build
        run: go build ./...
      - name: Cross-compile Intel-mac stub (darwin/amd64)
        if: matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=amd64 go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: capt-hook pack manifests move in lockstep
        run: |
          python3 - <<'PY'
          import sys, tomllib

          root = tomllib.load(open(".claude/capt-hook.toml", "rb"))["version"]
          plugin = tomllib.load(open("plugin/hooks/capt-hook.toml", "rb"))["version"]
          if root != plugin:
              sys.exit(
                  f"capt-hook manifest version skew: .claude/capt-hook.toml={root} "
                  f"!= plugin/hooks/capt-hook.toml={plugin}"
              )
          print(f"ok: both capt-hook manifests at {root}")
          PY

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          # capt-hook requires Python >=3.13; without this the runner's default
          # 3.12 makes uv resolve an old capt-hook that lacks newer hook APIs.
          python-version: "3.13"
      - name: capt-hook hook tests
        run: uvx capt-hook --hooks plugin/hooks test
