name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-suffix: codeexec
      - name: Install ast-grep (structural search/replace/outline engine)
        run: |
          uv tool install ast-grep-cli
          echo "$(uv tool dir --bin)" >> "$GITHUB_PATH"
      - name: Warm the codeexec sandbox runtime
        # Mirror the runtime launch flags (internal/codeexec/driver.go) so a PR's
        # checked-out uv.toml / pyproject cannot steer resolution here either.
        run: uv run --no-project --no-config --no-build --quiet --python "3.13" --with pydantic-monty==0.0.18 python -c "import pydantic_monty"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install zig (tree-sitter grammar wasm cc)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Build WASM engines + grammars (go:embed inputs)
        run: |
          bash scripts/build-wasm.sh
          bash scripts/build-embed-wasm.sh
          bash scripts/build-chunk-grammars.sh
      - name: Rust format-core tests (Rust suite + corpus gate)
        run: cargo test --manifest-path format-core/Cargo.toml
      - name: Vet
        run: go vet ./...
      - name: Install jj (live hunk-scoped ship tests)
        uses: taiki-e/install-action@v2
        with:
          tool: jj-cli
      - name: Test (race)
        run: go test -race ./...
      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install zig (tree-sitter grammar wasm cc)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Build WASM engines + grammars (go:embed inputs)
        run: |
          bash scripts/build-wasm.sh
          bash scripts/build-embed-wasm.sh
          bash scripts/build-chunk-grammars.sh
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install zig (tree-sitter grammar wasm cc)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Build WASM engines + grammars (go:embed inputs)
        run: |
          bash scripts/build-wasm.sh
          bash scripts/build-embed-wasm.sh
          bash scripts/build-chunk-grammars.sh
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      # The guard pack resolves ccx through plugin/bin/ccx — a gitignored
      # symlink since the self-provisioning installer replaced the checked-in
      # shim. Without a binary there, rewrite hooks degrade to blocks/no-ops
      # and the rewrite-expectation tests fail. Build from this checkout.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install zig (tree-sitter grammar wasm cc)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Build WASM engines + grammars (go:embed inputs)
        run: |
          bash scripts/build-wasm.sh
          bash scripts/build-embed-wasm.sh
          bash scripts/build-chunk-grammars.sh
      - name: Build ccx and link plugin/bin
        run: |
          go build -o bin/ccx ./cmd/ccx
          ln -sf ../../bin/ccx plugin/bin/ccx
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          # capt-hook requires Python >=3.13; without this the runner's default
          # 3.12 makes uv resolve an old capt-hook that lacks newer hook APIs.
          python-version: "3.13"
      - name: Cache NLP resources
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/spacy/models
            ~/.wn_data
          key: capt-hook-nlp-en_core_web_sm-oewn2025
      - name: Provision NLP resources (spaCy en_core_web_sm + oewn:2025 lexicon)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --no-project --with capt-hook python -c "from captain_hook.util.model_cache import ensure_nlp_resources; ensure_nlp_resources()"
      - name: Install cc-notes binary onto PATH
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/.local/bin"
          gh release download -R yasyf/cc-notes --pattern cc-notes_linux_amd64 --output "$HOME/.local/bin/cc-notes" --clobber
          chmod +x "$HOME/.local/bin/cc-notes"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: capt-hook pack test
        run: uvx --isolated 'capt-hook>=11.0.0' pack test plugin
      # The declarative harness can only inject a string tool_response; the dict
      # shapes Claude Code hands the guards (record_json_shape's real input, and the
      # rest of the guard/session-state unit tests) are covered by pytest over the
      # whole directory instead. Pinned to 3.13 with published capt-hook, matching
      # the harness.
      - name: Guard-pack pytest
        run: PYTHONPATH=plugin/capt-hook uv run --no-project --no-config --python 3.13 --with capt-hook --with pytest python -m pytest plugin/capt-hook/hooks/
