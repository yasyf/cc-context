name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Build
        run: go build ./...
      - name: Cross-compile Intel-mac stub (darwin/amd64)
        if: matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=amd64 go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: capt-hook pack manifests move in lockstep
        run: |
          python3 - <<'PY'
          import sys, tomllib

          root = tomllib.load(open(".claude/capt-hook.toml", "rb"))["version"]
          plugin = tomllib.load(open("plugin/hooks/capt-hook.toml", "rb"))["version"]
          if root != plugin:
              sys.exit(
                  f"capt-hook manifest version skew: .claude/capt-hook.toml={root} "
                  f"!= plugin/hooks/capt-hook.toml={plugin}"
              )
          print(f"ok: both capt-hook manifests at {root}")
          PY

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # The guard pack resolves ccx through plugin/bin/ccx — a gitignored
      # symlink since the self-provisioning installer replaced the checked-in
      # shim. Without a binary there, rewrite hooks degrade to blocks/no-ops
      # and the rewrite-expectation tests fail. Build from this checkout.
      - name: Build ccx and link plugin/bin
        run: |
          go build -o bin/ccx ./cmd/ccx
          ln -sf ../../bin/ccx plugin/bin/ccx
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          # capt-hook requires Python >=3.13; without this the runner's default
          # 3.12 makes uv resolve an old capt-hook that lacks newer hook APIs.
          python-version: "3.13"
      - name: Cache NLP resources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/spacy/models
            ~/.wn_data
          key: capt-hook-nlp-en_core_web_sm-oewn2025
      - name: Provision NLP resources (spaCy en_core_web_sm + oewn:2025 lexicon)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --no-project --with capt-hook python -c "from captain_hook.util.model_cache import ensure_nlp_resources; ensure_nlp_resources()"
      - name: Install cc-notes binary onto PATH
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/.local/bin"
          gh release download -R yasyf/cc-notes --pattern cc-notes_linux_amd64 --output "$HOME/.local/bin/cc-notes" --clobber
          chmod +x "$HOME/.local/bin/cc-notes"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: capt-hook hook tests
        run: uvx capt-hook --hooks plugin/hooks test
