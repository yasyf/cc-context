name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The plugin's install-binary.sh pins the release it downloads to the
  # plugin.json version, so a tag that doesn't match ships a plugin that 404s.
  verify-plugin-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: plugin.json version matches the tag
        run: |
          # First match only: the dependencies entries carry "version" keys of their own.
          V="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' plugin/.claude-plugin/plugin.json | head -n 1)"
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error file=plugin/.claude-plugin/plugin.json::plugin.json version is $V but the tag is $GITHUB_REF_NAME — set it to ${GITHUB_REF_NAME#v} in the release commit (AGENTS.md § Releases), then retag"
            exit 1
          fi

  release:
    needs: verify-plugin-version
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@v1
    secrets: inherit
    with:
      # ccx ships as a formula (livecheck + `brew install --HEAD` source build +
      # runtime depends_on ast-grep/uv) rendered from its template — goreleaser's
      # brews block can't express that, so render-formula + publish handle the .rb.
      render-formula: true
      formula-template: .github/formula/ccx.rb.tmpl
      formula-name: ccx

  # Validates the released darwin_arm64 tarball end to end, exercising the
  # uv-provisioned pydantic-monty sandbox driver an end user hits on `ccx exec`.
  smoke:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Run ccx exec from the released darwin_arm64 tarball
        env:
          # Keep the smoke test hermetic: never probe the runner for `claude`.
          CCX_EXEC_MCP: "off"
        run: |
          curl -fsSL -o ccx.tgz "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ccx_${GITHUB_REF_NAME#v}_darwin_arm64.tar.gz"
          tar xzf ccx.tgz
          test "$(./ccx exec '40+2')" = "42"
