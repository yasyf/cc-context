name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@52b26a1684d94ae2669d124f844148deaa4f5baf
    secrets: inherit
    with:
      # ccx ships as a formula (livecheck + `brew install --HEAD` source build +
      # runtime depends_on ast-grep/uv) rendered from its template — goreleaser's
      # brews block can't express that, so render-formula + publish handle the .rb.
      render-formula: true
      formula-template: .github/formula/ccx.rb.tmpl
      formula-name: ccx
      # Three WASM engines are go:embed'd and must exist before goreleaser
      # builds: format-core, embed-core (model2vec), and the tree-sitter grammar
      # modules (built with zig cc). pre-build runs after checkout+setup and
      # before goreleaser, on the goreleaser host (linux/x86_64).
      pre-build: |
        set -euo pipefail
        rustup target add wasm32-unknown-unknown
        # Extract zig OUTSIDE the checkout — a tarball unpacked into the repo
        # tree leaves an untracked dir that fails goreleaser's dirty-tree check.
        zig_url=$(curl -fsSL https://ziglang.org/download/index.json \
          | python3 -c "import sys,json;print(json.load(sys.stdin)['0.14.0']['x86_64-linux']['tarball'])")
        zig_dir="${RUNNER_TEMP:-/tmp}/zig"
        mkdir -p "$zig_dir"
        curl -fsSL "$zig_url" | tar -xJ -C "$zig_dir" --strip-components=1
        export PATH="$zig_dir:$PATH"
        bash scripts/build-wasm.sh
        bash scripts/build-embed-wasm.sh
        bash scripts/build-chunk-grammars.sh

  # Validates the released darwin_arm64 tarball end to end: the uv-provisioned
  # pydantic-monty sandbox driver behind `ccx exec`, and the wazero-run WASM
  # format engine behind `ccx format` — the latter is what dies under a hardened
  # runtime signed without allow-unsigned-executable-memory (SIGKILL at engine
  # init, which only a signed release artifact can exhibit; v0.16.0 shipped that).
  smoke:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Run ccx exec and ccx format from the released darwin_arm64 tarball
        env:
          # Keep the smoke test hermetic: never probe the runner for `claude`.
          CCX_EXEC_MCP: "off"
        run: |
          curl -fsSL -o ccx.tgz "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ccx_${GITHUB_REF_NAME#v}_darwin_arm64.tar.gz"
          tar xzf ccx.tgz
          test "$(./ccx exec '40+2')" = "42"
          test "$(echo '{"k": [1, 2, 3]}' | ./ccx format)" = '{"k":[1,2,3]}'

  # Refresh the committed binrun descriptor (plugin/bin/ccx.binrun) to pin the
  # just-released version, and move the plugin manifest to the same version in
  # the same commit. Both live in-tree because the plugin marketplace serves
  # main HEAD, so the version-exact descriptor and the manifest must both be on
  # main; the descriptor is re-uploaded to the release for parity. Bumping
  # plugin.json here (not in a separate hand commit) keeps it in lockstep with
  # the descriptor, so the CI agreement gate stays green after every release.
  # Gates on `release` (not a `release: published` trigger) because a release
  # goreleaser creates with the default GITHUB_TOKEN does not fire `release`
  # events for other workflows.
  descriptor:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --dir dist --pattern '*.tar.gz' --pattern 'checksums.txt'
      - name: Render descriptor and sync manifest version
        run: |
          version="${GITHUB_REF_NAME#v}"
          plugin/scripts/render-descriptor.sh dist "$version" > plugin/bin/ccx.binrun
          chmod +x plugin/bin/ccx.binrun
          jq --arg v "$version" '.version = $v' plugin/.claude-plugin/plugin.json > plugin/.claude-plugin/plugin.json.tmp
          mv plugin/.claude-plugin/plugin.json.tmp plugin/.claude-plugin/plugin.json
      - name: Validate descriptor
        run: go run github.com/yasyf/binrun/cmd/binrun@v0.1.1 -- parse plugin/bin/ccx.binrun
      - name: Commit refreshed descriptor and manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plugin/bin/ccx.binrun plugin/.claude-plugin/plugin.json; then
            echo "descriptor and manifest already current for ${GITHUB_REF_NAME}"
          else
            git add plugin/bin/ccx.binrun plugin/.claude-plugin/plugin.json
            git commit -m "chore(release): sync ccx.binrun + manifest to ${GITHUB_REF_NAME}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload descriptor to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" plugin/bin/ccx.binrun --repo "${GITHUB_REPOSITORY}" --clobber
